<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla de depósito</title>
    <link rel="stylesheet" href="../css/deposit.css">
</head>

<body data-page="deposit">

    <!-- BARRA SUPERIOR -->
    <header class="top-bar">

        <!-- IZQUIERDA: LOGO + HAMBURGUESA -->
        <div class="left">
            <button class="menu-toggle" aria-label="Abrir menú">☰</button>

            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10
               10-4.48 10-10S17.52 2 12 2z" fill="none" stroke="currentColor" stroke-width="2" />
                </svg>
                <span>Alke</span><strong>Wallet</strong>
            </div>
            <!-- MENÚ HAMBURGUESA -->
            <!-- MENÚ HAMBURGUESA -->
            <nav class="hamburger-menu">
                <a href="/assets/html/menu.html" data-redirect>Menú</a>
                <a href="/assets/html/deposit.html" data-redirect>Depositar</a>
                <a href="/assets/html/sendmoney.html" data-redirect>Enviar dinero</a>
                <a href="/assets/html/transaction.html" data-redirect>Últimos movimientos</a>
            </nav>



        </div>


        <!-- CERRAR SESIÓN -->
        <button id="cerrarSesion" class="logout-btn">
            Cerrar sesión
        </button>
    </header>

    <!-- CONTENIDO -->
    <main>
        <div class="container">
            <h2>Depositar</h2>

            <form>
                <div class="form-group">
                    <label for="montoDeposito">Monto a depositar:</label>
                    <input type="number" id="montoDeposito" class="input-uniforme" placeholder="Ingrese monto">
                </div>

                <button type="button" id="btnDepositar" class="btn-uniforme">
                    Realizar depósito
                </button>


            </form>

            <a href="/assets/html/menu.html" class="btn-uniforme secondary" data-redirect>

                Volver al Menú Principal
            </a>
        </div>
    </main>

    <script src="../js/script.js"></script>
</body>

</html>
