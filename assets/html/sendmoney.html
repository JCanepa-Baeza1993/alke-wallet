<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" charset="width=device-width, initial-scale:1.0">
    <title>Enviar dinero</title>
    <link rel="stylesheet" href="../css/sendmoney.css">
</head>

<body>
    <!-- BARRA SUPERIOR -->
    <header class="top-bar">

        <div class="left">
            <!-- HAMBURGUESA -->
            <button class="menu-toggle" aria-label="Abrir menú">☰</button>

            <!-- LOGO -->
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10
                10-4.48 10-10S17.52 2 12 2z" fill="none" stroke="currentColor" stroke-width="2" />
                </svg>
                <span>Alke</span><strong>Wallet</strong>
            </div>

            <!-- MENÚ HAMBURGUESA -->
            <!-- MENÚ HAMBURGUESA -->
            <nav class="hamburger-menu">
                <a href="/assets/html/menu.html" data-redirect>Menú</a>
                <a href="/assets/html/deposit.html" data-redirect>Depositar</a>
                <a href="/assets/html/sendmoney.html" data-redirect>Enviar dinero</a>
                <a href="/assets/html/transaction.html" data-redirect>Últimos movimientos</a>
            </nav>



        </div>

        <!-- CERRAR SESIÓN -->
        <button id="cerrarSesion" class="logout-btn">
            Cerrar sesión
        </button>

    </header>


    <!-- CONTENIDO -->
    <main>
        <div class="container">
            <h2>Enviar Dinero</h2>
            <form>
                <div class="form-group">
                    <label for="searchContact">Buscar en la agenda de transferencias:</label><br>
                    <input type="text" id="searchContact" class="form-control" placeholder="Buscar contacto">
                </div>
                <button type="button">Agregar nuevo contacto</button>

                <h3>Contactos</h3>
                <ul id="contactList" class="list-group mb-3">
                    <li class="list-group-item contacto" data-nombre="Isapre Nueva Masvida S.A.">
                        <div class="d-flex justify-content-between align-items-center"></div>
                        <h5 class="mb-0 font-weight-bold">Isapre Nueva Masvida S.A.</h5>
                        <div class="font-weight-bold">Banco: Banco de Chile</div>
                        <small class="font-weight-bold">RUT: 96.504.160-5</small>
                    </li>
                    <li class="list-group-item contacto" data-nombre="Clínica Dávila S.A.">
                        <div class="d-flex justify-content-between align-items-center"></div>
                        <h5 class="mb-0 font-weight-bold">Clínica Dávila S.A.</h5>
                        <div class="font-weight-bold">Banco: Santander</div>
                        <small class="font-weight-bold">RUT: 96.530.470-3</small>
                    </li>
                </ul>
                <div class="form-group">
                    <label for="montoEnvio">Monto a enviar:</label>
                    <input type="number" id="montoEnvio" class="form-control" placeholder="Ingrese monto">
                </div>
            </form>
            <a href="/assets/html/menu.html" class="button" data-redirect>
                Volver al menú principal
            </a>

    </main>

    <script src="../js/script.js"></script>
</body>

</html>
